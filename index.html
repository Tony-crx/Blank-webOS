<!doctype html>
<html lang="id">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- SEO Tags -->
  <title>BLANK OS Command Shell</title>
  <meta name="description"
    content="Modern minimal B&W Text User Interface command shell." />

  <!-- Modern JetBrains Mono Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&display=swap" rel="stylesheet">

  <link rel="icon" type="image/svg+xml"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='0.9em' font-size='90'>💾</text></svg>" />
</head>

<body>

  <!-- Clean Full-screen Modern B&W Terminal Container -->
  <div id="monitor-screen" class="monitor-screen theme-white">

    <!-- Fullscreen Boot Prompt -->
    <div id="boot-overlay" class="boot-overlay">
      <div class="boot-prompt-text">
        BLANK OS [Version 1.0.0]<br>
        Press any key to begin . . . <span class="blink-cursor">_</span>
      </div>
    </div>

    <!-- Main Text Area -->
    <div class="crt-content">
      <div id="terminal-container" class="terminal-container"></div>
    </div>

  </div>

  <script type="module" src="/src/main.js"></script>
</body>

</html>
